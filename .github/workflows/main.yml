name: Update Playlist

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download playlist
        run: |
          curl -L -o TV.m3u "https://raw.githubusercontent.com/Dimonovich/TV/Dimonovich/FREE/TV"

      - name: Commit changes
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add TV.m3u
          git commit -m "Update playlist" || exit 0
          git push
